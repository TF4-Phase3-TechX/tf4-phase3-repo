# Test manifest — vi phạm luật image tag (latest/mutable).
# Set sẵn runAsNonRoot + capabilities.drop để CÔ LẬP đúng 1 luật vi phạm (tag).
# Production (techx-tf4) đã [Deny] -> apply BỊ REJECT do image tag. Dùng --dry-run=server
# để không tạo pod thật trong production. Xem plan §7.
apiVersion: v1
kind: Pod
metadata:
  name: sec11-test-bad-tag
  namespace: techx-tf4
spec:
  containers:
  - name: app
    image: nginx:latest
    securityContext:
      runAsNonRoot: true
      runAsUser: 101
      capabilities: {drop: ["ALL"]}
    resources:
      requests: {cpu: "50m", memory: "64Mi"}
      limits: {cpu: "100m", memory: "128Mi"}
