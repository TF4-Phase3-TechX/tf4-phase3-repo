# CDO08-SEC-11 test manifest — vi phạm Mandate-05 #3 (thiếu requests/limits).
# Set sẵn runAsNonRoot + capabilities.drop + image pin để CÔ LẬP đúng 1 luật vi phạm (resources).
# Apply vào techx-admission-test (binding Deny) -> BỊ REJECT do thiếu resources.
apiVersion: v1
kind: Pod
metadata:
  name: sec11-test-missing-resources
  namespace: techx-admission-test
spec:
  containers:
  - name: app
    image: nginx:1.27.0
    securityContext:
      runAsNonRoot: true
      runAsUser: 101
      capabilities: {drop: ["ALL"]}
