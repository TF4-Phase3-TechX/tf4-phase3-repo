# Manual-apply only — NOT part of the standing deploy/admission/runtime-hardening.yaml.
#
# Binds the same 4 policies in [Deny] mode, scoped ONLY to namespace
# techx-admission-test, so a violating manifest can be shown being rejected on
# apply without enabling Deny on production. Apply/remove by hand when running
# the demo for a reviewer; do not wire this into CI/CD or GitOps.
#
#   kubectl apply  -f docs/cdo08/week2/sec11-test-manifests/demo-deny-bindings.yaml
#   kubectl delete -f docs/cdo08/week2/sec11-test-manifests/demo-deny-bindings.yaml
#
# Requires deploy/admission/runtime-hardening.yaml already applied (the
# policies referenced below must exist first).
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: require-run-as-nonroot-deny
spec:
  policyName: require-run-as-nonroot
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchLabels: { kubernetes.io/metadata.name: techx-admission-test }
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: disallow-mutable-image-tag-deny
spec:
  policyName: disallow-mutable-image-tag
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchLabels: { kubernetes.io/metadata.name: techx-admission-test }
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: require-resource-limits-deny
spec:
  policyName: require-resource-limits
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchLabels: { kubernetes.io/metadata.name: techx-admission-test }
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: require-drop-all-capabilities-deny
spec:
  policyName: require-drop-all-capabilities
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchLabels: { kubernetes.io/metadata.name: techx-admission-test }
