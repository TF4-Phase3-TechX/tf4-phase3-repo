# Test manifest — vi phạm cả 2 luật nhóm non-root:
# thiếu runAsNonRoot (policy require-run-as-nonroot) VÀ thiếu capabilities.drop
# (policy require-drop-all-capabilities).
# Apply vào techx-admission-test (binding Deny) -> BỊ REJECT (mentor thấy tận mắt).
# Đổi namespace sang techx-tf4 (binding Audit) -> PASS + audit annotation. Xem plan §0/§6/§7.
apiVersion: v1
kind: Pod
metadata:
  name: sec11-test-bad-root
  namespace: techx-admission-test
spec:
  containers:
  - name: app
    image: nginx:1.27.0
    resources:
      requests: {cpu: "50m", memory: "64Mi"}
      limits: {cpu: "100m", memory: "128Mi"}
