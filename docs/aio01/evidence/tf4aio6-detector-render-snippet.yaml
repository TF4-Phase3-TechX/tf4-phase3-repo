# Source: techx-corp/templates/component.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: detector
  labels:
    helm.sh/chart: techx-corp-0.40.9

    opentelemetry.io/name: detector

    app.kubernetes.io/version: "2.2.0"
    app.kubernetes.io/component: detector
    app.kubernetes.io/name: detector
    app.kubernetes.io/part-of: techx-corp
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:

      opentelemetry.io/name: detector
  template:
    metadata:
      labels:

        opentelemetry.io/name: detector

        app.kubernetes.io/version: "2.2.0"
        app.kubernetes.io/component: detector
        app.kubernetes.io/name: detector
      annotations:
        resource.opentelemetry.io/service.namespace: techx-corp
    spec:
      serviceAccountName: techx-corp
      containers:
        - name: detector
          image: 'busybox:1.36'
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                ts=$(date -u +%FT%TZ)
                probe_url="${PROMETHEUS_URL:-http://prometheus:9090/api/v1/query?query=up}"
                timeout_s="${PROMETHEUS_TIMEOUT_SECONDS:-8}"
                response="$(wget -q -T "$timeout_s" -O - "$probe_url" 2>/dev/null || true)"

                detection_id="${DETECTOR_RULE_ID:-prometheus-up-probe-v1}-$ts"
                observed_value="n/a"
                severity="warning"
                incident_type="prometheus_probe_error"
                summary="Prometheus probe failed"

                if [ -n "$response" ] && echo "$response" | grep -q '"status":"success"'; then
                  observed_value=$(echo "$response" | grep -o '"metric"' | wc -l | tr -d ' ')
                  if [ "${observed_value:-0}" -ge 1 ]; then
                    severity="info"
                    incident_type="prometheus_probe_ok"
                    summary="Prometheus probe succeeded"
                  else
                    severity="warning"
                    incident_type="prometheus_probe_empty"
                    summary="Prometheus probe returned no active target"
                  fi
                fi

                payload=$(printf '{"timestamp":"%s","detection_id":"%s","detector":"aioops-detector","service":"%s","environment":"%s","channel":"%s","schema_version":"%s","incident_type":"%s","severity":"%s","summary":"%s","observed_value":"%s","threshold":"%s","runbook_url":"%s","evidence":{"prometheus_url":"%s"},"owner":"AIOps-oncall","owner_response_path":"%s"}' "$ts" "$detection_id" "${DETECTOR_SERVICE:-detector}" "${DETECTOR_ENVIRONMENT:-unknown}" "${OUTPUT_CHANNEL:-stdout-jsonl}" "${OUTPUT_SCHEMA_VERSION:-1.0}" "$incident_type" "$severity" "$summary" "$observed_value" "${DETECTOR_THRESHOLD:-at_least_one_up_target}" "${RUNBOOK_URL:-https://github.com/TF4-Phase3-TechX/tf4-phase3-repo/tree/main/docs/audit/runbooks}" "$probe_url" "${OWNER_RESPONSE_PATH:-open-runbook-then-create-incident-ticket}")
                echo "$payload"
                sleep 60
              done
          env:
            - name: OTEL_SERVICE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.labels['app.kubernetes.io/component']
            - name: OTEL_COLLECTOR_NAME
              value: otel-collector
            - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
              value: cumulative
            - name: PROMETHEUS_URL
              value: http://prometheus:9090/api/v1/query?query=up
            - name: PROMETHEUS_TIMEOUT_SECONDS
              value: "8"
            - name: OUTPUT_CHANNEL
              value: stdout-jsonl
            - name: OUTPUT_SCHEMA_VERSION
              value: "1.0"
            - name: DETECTOR_SERVICE
              value: detector
            - name: DETECTOR_ENVIRONMENT
              value: techx-tf4
            - name: DETECTOR_RULE_ID
              value: prometheus-up-probe-v1
            - name: DETECTOR_THRESHOLD
              value: at_least_one_up_target
            - name: RUNBOOK_URL
              value: https://github.com/TF4-Phase3-TechX/tf4-phase3-repo/tree/main/docs/audit/runbooks
            - name: OWNER_RESPONSE_PATH
              value: open-runbook-then-create-incident-ticket
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://$(OTEL_COLLECTOR_NAME):4317
          resources:
            limits:
              cpu: 50m
              memory: 32Mi
            requests:
              cpu: 10m
              memory: 16Mi
