apiVersion: v1
kind: Pod
metadata:
  name: compliant-resource-pod
  namespace: techx-admission-test
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: nginx:1.25-alpine
      command: ["sh", "-c", "echo ready && sleep 3600"]
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
