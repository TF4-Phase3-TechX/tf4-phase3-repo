apiVersion: v1
kind: Pod
metadata:
  name: initcontainer-missing-resources
  namespace: techx-admission-test
spec:
  restartPolicy: Never
  initContainers:
    - name: init
      image: busybox:1.36
      command: ["sh", "-c", "echo init && sleep 1"]
  containers:
    - name: app
      image: nginx:1.25-alpine
      command: ["sh", "-c", "echo ready && sleep 3600"]
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
