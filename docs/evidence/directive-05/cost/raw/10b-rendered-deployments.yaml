apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounting
  labels:
    helm.sh/chart: techx-corp-0.40.9
    opentelemetry.io/name: accounting
    app.kubernetes.io/version: 2.2.0
    app.kubernetes.io/component: accounting
    app.kubernetes.io/name: accounting
    app.kubernetes.io/part-of: techx-corp
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: accounting
  template:
    metadata:
      labels:
        opentelemetry.io/name: accounting
        app.kubernetes.io/version: 2.2.0
        app.kubernetes.io/component: accounting
        app.kubernetes.io/name: accounting
      annotations:
        resource.opentelemetry.io/service.namespace: techx-corp
    spec:
      serviceAccountName: techx-corp
      containers:
      - name: accounting
        image: 511825856493.dkr.ecr.us-east-1.amazonaws.com/techx-corp:preview-accounting
        imagePullPolicy: IfNotPresent
        env:
        - name: OTEL_SERVICE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.kubernetes.io/component']
        - name: OTEL_COLLECTOR_NAME
          value: otel-collector.techx-observability.svc.cluster.local
        - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
          value: cumulative
        - name: KAFKA_ADDR
          value: kafka:9092
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://$(OTEL_COLLECTOR_NAME):4318
        - name: DB_CONNECTION_STRING
          value: Host=postgresql;Username=otelu;Password=otelp;Database=otel
        - name: OTEL_DOTNET_AUTO_TRACES_ENTITYFRAMEWORKCORE_INSTRUMENTATION_ENABLED
          value: 'false'
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 256Mi
        volumeMounts: null
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;
        image: busybox:latest
        name: wait-for-kafka
        resources:
          limits:
            cpu: 25m
            memory: 32Mi
          requests:
            cpu: 5m
            memory: 8Mi
      volumes: null
---
