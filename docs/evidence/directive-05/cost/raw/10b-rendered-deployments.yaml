apiVersion: apps/v1
kind: Deployment
metadata:
  name: flagd
  labels:
    helm.sh/chart: techx-corp-0.40.9
    opentelemetry.io/name: flagd
    app.kubernetes.io/version: 2.2.0
    app.kubernetes.io/component: flagd
    app.kubernetes.io/name: flagd
    app.kubernetes.io/part-of: techx-corp
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: flagd
  template:
    metadata:
      labels:
        opentelemetry.io/name: flagd
        app.kubernetes.io/version: 2.2.0
        app.kubernetes.io/component: flagd
        app.kubernetes.io/name: flagd
      annotations:
        resource.opentelemetry.io/service.namespace: techx-corp
    spec:
      serviceAccountName: techx-corp
      containers:
      - name: flagd
        image: ghcr.io/open-feature/flagd:v0.12.9
        imagePullPolicy: IfNotPresent
        command:
        - /flagd-build
        - start
        - --port
        - '8013'
        - --ofrep-port
        - '8016'
        - --sources
        - '[{"uri":"https://122.248.223.194.sslip.io/flags.json","provider":"http","authHeader":"Bearer
          8de6246060a65f500bc44988467c5985b77d0808998284f9"}]'
        ports:
        - containerPort: 8013
          name: rpc
        - containerPort: 8016
          name: ofrep
        env:
        - name: OTEL_SERVICE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.kubernetes.io/component']
        - name: OTEL_COLLECTOR_NAME
          value: otel-collector.techx-observability.svc.cluster.local
        - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
          value: cumulative
        - name: FLAGD_METRICS_EXPORTER
          value: otel
        - name: FLAGD_OTEL_COLLECTOR_URI
          value: $(OTEL_COLLECTOR_NAME):4317
        - name: GOMEMLIMIT
          value: 60MiB
        resources:
          limits:
            cpu: 100m
            memory: 75Mi
          requests:
            cpu: 20m
            memory: 40Mi
        volumeMounts:
        - name: config-rw
          mountPath: /etc/flagd
      initContainers:
      - command:
        - sh
        - -c
        - cp /config-ro/demo.flagd.json /config-rw/demo.flagd.json && cat /config-rw/demo.flagd.json
        image: busybox
        name: init-config
        resources:
          limits:
            cpu: 25m
            memory: 32Mi
          requests:
            cpu: 5m
            memory: 8Mi
        volumeMounts:
        - mountPath: /config-ro
          name: config-ro
        - mountPath: /config-rw
          name: config-rw
      volumes:
      - name: config-rw
        emptyDir: {}
      - configMap:
          name: flagd-config
        name: config-ro
---
