  guardrail_id: wckqh9dms6qa
  guardrail_arn: arn:aws:bedrock:us-east-1:511825856493:guardrail/wckqh9dms6qa
  rollback_version: "1"
  expected_target_version: "2"
  target_version_must_be_verified_before_publish: true
  gitops_values_source: deploy/values-aio-llm.yaml
  deletion_forbidden: true

candidate:
  canonical_input: docs/aio1/mandate-06/guardrail/create-standard-candidate-v2.json
  required_content_filter_tier: STANDARD
  required_topic_tier: STANDARD
  required_topic_name: PromptInjectionAndHiddenInstructionRequests
  required_topic_count: 1
  required_guardrail_profile: us.guardrail.v1:0
  required_utf8_example_locales: [en, vi, fr, es, id]

iam:
  cdo_deployer_template: docs/aio1/mandate-06/iam/cdo-standard-guardrail-deployer.template.json
  evaluator_template: docs/aio1/mandate-06/iam/evaluator-standard-candidate.template.json
  runtime_transition_template: docs/aio1/mandate-06/iam/runtime-policy-standard-transition.template.json
  production_transition_allowed_guardrails:
    - arn:aws:bedrock:us-east-1:511825856493:guardrail/wckqh9dms6qa:1
    - arn:aws:bedrock:us-east-1:511825856493:guardrail/wckqh9dms6qa:2
  access_analyzer_required: true

gitops:
  repository: TF4-Phase3-TechX/tf4-phase3-gitops-manifests
  production_values_target: environments/production/app-values.yaml
  candidate_values_template: docs/aio1/mandate-06/guardrail/gitops-values-standard-candidate.template.yaml
  parameters:
    BEDROCK_GUARDRAIL_ID: wckqh9dms6qa
    BEDROCK_GUARDRAIL_VERSION: "2"
  only_expected_diff: BEDROCK_GUARDRAIL_VERSION

evaluation_gates:
  - evaluation_guardrail_h2za64pyoh1i_version_3_ready
  - utf8_topic_readback_exact
  - apply_guardrail_100_case_numeric_suite_passes_without_errors
  - converse_10_case_numeric_suite_passes_without_errors
  - recorded_direct_attack_09_intervenes

production_gates:
  - production_latest_version_is_1_before_draft_update
  - production_draft_matches_canonical_policy
  - production_version_2_ready
  - runtime_transition_policy_allows_versions_1_and_2
  - production_smoke_passes
  - gitops_diff_changes_only_guardrail_version
  - named_cdo_owner_aio_witness_security_reviewer_and_rollback_owner

rollback:
  trigger: any_safety_identity_provider_or_storefront_gate_failure
  action: revert_gitops_to_wckqh9dms6qa_version_1
  iam_prerequisite: transition_policy_keeps_versions_1_and_2_allowed
  guardrail_cleanup: retain_both_numeric_versions_for_forensics

evidence:
  template: docs/aio1/mandate-06/guardrail/sanitized-standard-candidate-evidence.template.json
  retention: metadata_only
