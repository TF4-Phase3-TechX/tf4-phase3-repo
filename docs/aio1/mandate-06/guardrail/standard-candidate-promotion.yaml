schema_version: 1
change_id: M06-GUARDRAIL-STANDARD-V2
scope: standard_tier_plus_one_measured_semantic_topic

reason:
  recorded_miss: direct-attack-09
  observation: Standard-only evaluation Guardrail h2za64pyoh1i version 1 did not intervene in either ApplyGuardrail or exact Converse.
  corrective_delta: Add exactly one Standard DENY topic named PromptInjectionAndHiddenInstructionRequests.
  calibration: Evaluation version 2 blocked all 15 curated attacks but only 54 of 60 generated variants; the same topic was tuned against those recorded failures without changing the dataset or gates.
  limitation: The model returned the safe insufficient-information response in the recorded Converse miss, but that is not a Guardrail intervention.

invariants:
  - The candidate preserves the v1 content-filter strengths, four PII rules and blocked messages.
  - Expected policy differences are the STANDARD content-filter tier, US cross-Region profile, and exactly one measured Standard semantic DENY topic.
  - Production Guardrail wckqh9dms6qa version 1 remains immutable and is never deleted; its DRAFT may be updated only after evaluation version 3 passes.
  - The application model, prompt contract, local filter and output mode do not change in the AWS policy promotion.
  - Contextual grounding and additional PII entities remain deferred to separately measured changes.

