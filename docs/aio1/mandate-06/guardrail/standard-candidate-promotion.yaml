  guardrail_profile:
    id: us.guardrail.v1:0
    destination_regions: [us-east-1, us-east-2, us-west-2]

evaluation:
  account_id: "589077667575"
  guardrail_id: h2za64pyoh1i
  guardrail_arn: arn:aws:bedrock:us-east-1:589077667575:guardrail/h2za64pyoh1i
  historical_standard_only_version: "1"
  historical_standard_only_result: FAIL_PROMPT_ATTACK_INTERVENTION
  historical_semantic_topic_version: "2"
  historical_semantic_topic_result: FAIL_GENERATED_VARIANT_GATE_54_OF_60
