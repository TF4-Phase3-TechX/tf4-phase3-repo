runbooks:
  - id: llm-timeout-escalation
    incident_type: llm_timeout_error
    automatic_action: null
    steps:
      - Confirm the error-rate window in Prometheus.
      - Correlate timeout/rate-limit logs and failed traces.
      - Verify provider configuration and application fallback behavior.
      - Escalate to the product-reviews and LLM owners.
  - id: deployment-latency-rollback
    incident_type: service_latency_spike
    automatic_action: rollback_previous_replicaset
    preconditions:
      - Pre-authorized policy envelope: REMEDIATION_MODE=live, incident_type in autonomous allowlist.
      - Detector confidence >= AIOPS_REMEDIATION_CONFIDENCE_THRESHOLD (default 0.75).
      - Target service in CDO-approved AIOPS_ALLOWED_DEPLOYMENTS allowlist.
      - Cooldown window cleared since last autonomous action on this target.
      - Deployment retains a previous ReplicaSet within AIOPS_DEPLOYMENT_RECENCY_HOURS.
      - Latency degradation is sustained and user-facing (sustained_polls >= 1).
    verification:
      - Deployment rollout becomes ready within 60s (12 x 5s checks).
      - SLO verifier confirms healthy: latency and error rate recovered.
      - On verify failure: original template is restored (rollback) and incident escalated.
  - id: service-error-rate-escalation
    incident_type: service_error_rate_spike
    automatic_action: null
    steps:
      - Confirm the per-service error-rate and minimum request volume in Prometheus.
      - Correlate failed traces and scoped error logs for the same service and window.
      - Review recent deployments without assigning causality from timing alone.
      - Escalate to the owning service team with the evidence bundle.
