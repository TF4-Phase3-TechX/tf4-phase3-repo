static_resources:
  listeners:
    - address:
        socket_address:
          address: "${ENVOY_ADDR}"
          port_value: ${ENVOY_PORT}
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: AUTO
                stat_prefix: ingress_http
                tracing:
                  spawn_upstream_span: true
                  provider:
                    name: envoy.tracers.opentelemetry
                    typed_config:
                      "@type": type.googleapis.com/envoy.config.trace.v3.OpenTelemetryConfig
                      grpc_service:
                        envoy_grpc:
                          cluster_name: opentelemetry_collector_grpc
                        timeout: 0.250s
                      service_name: ${OTEL_SERVICE_NAME}
                      resource_detectors:
                        - name: envoy.tracers.opentelemetry.resource_detectors.environment
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.tracers.opentelemetry.resource_detectors.v3.EnvironmentResourceDetectorConfig
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: frontend
                      domains:
                        - "*"
                      routes:
                        # Deny rules for internal operational portals (CDO08-SEC-05)
                        - match: { path: "/grafana" }
                          direct_response: { status: 404 }
                        - match: { prefix: "/grafana/" }
                          direct_response: { status: 404 }

                        - match: { path: "/jaeger" }
                          direct_response: { status: 404 }
                        - match: { prefix: "/jaeger/" }
                          direct_response: { status: 404 }

                        - match: { path: "/loadgen" }
                          direct_response: { status: 404 }
                        - match: { prefix: "/loadgen/" }
                          direct_response: { status: 404 }

                        - match: { path: "/feature" }
                          direct_response: { status: 404 }
                        - match: { prefix: "/feature/" }
                          direct_response: { status: 404 }

                        - match: { path: "/flagservice" }
                          direct_response: { status: 404 }
                        - match: { prefix: "/flagservice/" }
                          direct_response: { status: 404 }

                        - match: { path: "/otlp-http" }
                          direct_response: { status: 404 }
                        - match: { prefix: "/otlp-http/" }
                          direct_response: { status: 404 }

                        # Allowed public routes
                        - name: images
                          match: { prefix: "/images/" }
                          route: { cluster: image-provider, prefix_rewrite: "/" }

                        # Local buckets are per Envoy process. Unknown and static routes stay on the
                        # unthrottled catch-all so new endpoints are not limited accidentally.
                        - name: checkout
                          match:
                            path: "/api/checkout"
                            headers:
                              - name: ":method"
                                string_match: { exact: "POST" }
                          route: { cluster: frontend }
                          typed_per_filter_config:
                            envoy.filters.http.local_ratelimit:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                              stat_prefix: checkout
                              token_bucket:
                                max_tokens: ${ENVOY_LOCAL_RL_CHECKOUT_RPS}
                                tokens_per_fill: ${ENVOY_LOCAL_RL_CHECKOUT_RPS}
                                fill_interval: 1s
                              filter_enabled:
                                default_value:
                                  numerator: ${ENVOY_LOCAL_RL_ENABLED_PERCENT}
                                  denominator: HUNDRED
                              filter_enforced:
                                default_value:
                                  numerator: ${ENVOY_LOCAL_RL_ENFORCED_PERCENT}
                                  denominator: HUNDRED
                              response_headers_to_add:
                                - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                                  header: { key: "retry-after", value: "1" }

                        - name: cart
                          match:
                            path: "/api/cart"
                            headers:
                              - name: ":method"
                                string_match:
                                  safe_regex: { regex: "GET|POST|DELETE" }
                          route: { cluster: frontend }
                          typed_per_filter_config:
                            envoy.filters.http.local_ratelimit:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                              stat_prefix: cart
                              token_bucket:
                                max_tokens: ${ENVOY_LOCAL_RL_CART_RPS}
                                tokens_per_fill: ${ENVOY_LOCAL_RL_CART_RPS}
                                fill_interval: 1s
                              filter_enabled:
                                default_value:
                                  numerator: ${ENVOY_LOCAL_RL_ENABLED_PERCENT}
                                  denominator: HUNDRED
                              filter_enforced:
                                default_value:
                                  numerator: ${ENVOY_LOCAL_RL_ENFORCED_PERCENT}
                                  denominator: HUNDRED
                              response_headers_to_add:
                                - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                                  header: { key: "retry-after", value: "1" }

                        - name: ai
                          match:
                            safe_regex:
                              regex: "/api/(product-ask-ai-assistant/[^/]+|product-search-ai|copilot-cart-confirm)"
                            headers:
                              - name: ":method"
                                string_match: { exact: "POST" }
                          route: { cluster: frontend }
                          typed_per_filter_config:
                            envoy.filters.http.local_ratelimit:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                              stat_prefix: ai
                              token_bucket:
                                max_tokens: ${ENVOY_LOCAL_RL_AI_BURST}
                                tokens_per_fill: ${ENVOY_LOCAL_RL_AI_RPS}
                                fill_interval: 1s
                              filter_enabled:
                                default_value:
                                  numerator: ${ENVOY_LOCAL_RL_ENABLED_PERCENT}
                                  denominator: HUNDRED
                              filter_enforced:
                                default_value:
                                  numerator: ${ENVOY_LOCAL_RL_ENFORCED_PERCENT}
                                  denominator: HUNDRED
                              response_headers_to_add:
                                - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                                  header: { key: "retry-after", value: "1" }

                        - name: browse
                          match:
                            # RE2's program-size guard requires compact grouping.
                            safe_regex:
                              regex: "/(|api/(product.*|recommendations|data.*|currency|shipping)|(product|cart).*)"
                            headers:
                              - name: ":method"
                                string_match: { exact: "GET" }
                          route: { cluster: frontend }
                          typed_per_filter_config:
                            envoy.filters.http.local_ratelimit:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                              stat_prefix: browse
                              token_bucket:
                                max_tokens: ${ENVOY_LOCAL_RL_BROWSE_BURST}
                                tokens_per_fill: ${ENVOY_LOCAL_RL_BROWSE_RPS}
                                fill_interval: 1s
                              filter_enabled:
                                default_value:
                                  numerator: ${ENVOY_LOCAL_RL_ENABLED_PERCENT}
                                  denominator: HUNDRED
                              filter_enforced:
                                default_value:
                                  numerator: ${ENVOY_LOCAL_RL_ENFORCED_PERCENT}
                                  denominator: HUNDRED
                              response_headers_to_add:
                                - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                                  header: { key: "retry-after", value: "1" }

                        - name: frontend-catch-all
                          match: { prefix: "/" }  # Keep last since prefix:"/" matches everything.
                          route: { cluster: frontend }
                http_filters:
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: local_rate_limiter
                  - name: envoy.filters.http.fault
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.fault.v3.HTTPFault
                      max_active_faults: 100
                      delay:
                        header_delay: {}
                        percentage:
                          numerator: 100
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                access_log:
                  - name: envoy.access_loggers.open_telemetry
                    typed_config:
                      "@type": "type.googleapis.com/envoy.extensions.access_loggers.open_telemetry.v3.OpenTelemetryAccessLogConfig"
                      common_config:
                        log_name: "otel_envoy_access_log"
                        grpc_service:
                          envoy_grpc:
                            cluster_name: opentelemetry_collector_grpc
                        transport_api_version: "V3"
                      body:
                        # yamllint disable-line rule:line-length
                        string_value: "[%START_TIME%] \"%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%\" %RESPONSE_CODE% %RESPONSE_FLAGS% %RESPONSE_CODE_DETAILS% %CONNECTION_TERMINATION_DETAILS% \"%UPSTREAM_TRANSPORT_FAILURE_REASON%\" %BYTES_RECEIVED% %BYTES_SENT% %DURATION% %RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)% \"%REQ(X-FORWARDED-FOR)%\" \"%REQ(USER-AGENT)%\" \"%REQ(X-REQUEST-ID)%\" \"%REQ(:AUTHORITY)%\" \"%UPSTREAM_HOST%\" %UPSTREAM_CLUSTER% %UPSTREAM_LOCAL_ADDRESS% %DOWNSTREAM_LOCAL_ADDRESS% %DOWNSTREAM_REMOTE_ADDRESS% %REQUESTED_SERVER_NAME% %ROUTE_NAME%\n"
                      resource_attributes:
                        values:
                          - key: "service.name"
                            value:
                              string_value: ${OTEL_SERVICE_NAME}
                      attributes:
                        values:
                          - key: "destination.address"
                            value:
                              string_value: "%UPSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                          - key: "event.name"
                            value:
                              string_value: "proxy.access"
                          - key: "server.address"
                            value:
                              string_value: "%DOWNSTREAM_LOCAL_ADDRESS%"
                          - key: "source.address"
                            value:
                              string_value: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                          - key: "upstream.cluster"
                            value:
                              string_value: "%UPSTREAM_CLUSTER%"
                          - key: "upstream.host"
                            value:
                              string_value: "%UPSTREAM_HOST%"
                          - key: "user_agent.original"
                            value:
                              string_value: "%REQ(USER-AGENT)%"
                          - key: "url.full"
                            value:
                              string_value: "%REQ(:SCHEME)%://%REQ(:AUTHORITY)%%REQ(:PATH)%"
                          - key: "url.path"
                            value:
                              string_value: "%REQ(:PATH)%"
                          - key: "url.query"
                            value:
                              string_value: "%REQ(:QUERY)%"
                          - key: "url.template"
                            value:
                              string_value: "%ROUTE_NAME%"
  clusters:
    - name: opentelemetry_collector_grpc
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: opentelemetry_collector_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${OTEL_COLLECTOR_HOST}
                      port_value: ${OTEL_COLLECTOR_PORT_GRPC}
    - name: opentelemetry_collector_http
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: opentelemetry_collector_http
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${OTEL_COLLECTOR_HOST}
                      port_value: ${OTEL_COLLECTOR_PORT_HTTP}
    - name: frontend
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: frontend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${FRONTEND_HOST}
                      port_value: ${FRONTEND_PORT}
    - name: image-provider
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: image-provider
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${IMAGE_PROVIDER_HOST}
                      port_value: ${IMAGE_PROVIDER_PORT}
    - name: flagservice
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: flagservice
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${FLAGD_HOST}
                      port_value: ${FLAGD_PORT}
    - name: flagd-ui
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: flagd-ui
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${FLAGD_UI_HOST}
                      port_value: ${FLAGD_UI_PORT}
    - name: loadgen
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: loadgen
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${LOCUST_WEB_HOST}
                      port_value: ${LOCUST_WEB_PORT}
    - name: grafana
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: grafana
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${GRAFANA_HOST}
                      port_value: ${GRAFANA_PORT}
    - name: jaeger
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: jaeger
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${JAEGER_HOST}
                      port_value: ${JAEGER_UI_PORT}
admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: ${ENVOY_ADMIN_PORT}
layered_runtime:
  layers:
    - name: static_layer_0
      static_layer:
        envoy:
          resource_limits:
            listener:
              example_listener_name:
                connection_limit: 10000
