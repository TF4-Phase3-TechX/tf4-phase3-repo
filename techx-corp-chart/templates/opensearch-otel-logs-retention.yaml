{{- if .Values.opensearch.otelLogsLifecycle.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: opensearch-otel-logs-retention
  labels:
    app.kubernetes.io/name: opensearch-otel-logs-retention
    app.kubernetes.io/component: observability-retention
    app.kubernetes.io/part-of: techx-corp
    app.kubernetes.io/managed-by: Helm
spec:
  schedule: {{ .Values.opensearch.otelLogsLifecycle.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: opensearch-otel-logs-retention
        spec:
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 100
            runAsGroup: 101
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: retention
              image: {{ .Values.opensearch.otelLogsLifecycle.image | quote }}
              command: [sh, -ec]
              args:
                - |
                  endpoint={{ .Values.opensearch.otelLogsLifecycle.endpoint | quote }}
                  pattern='otel-logs-*'
                  policy={{ .Values.opensearch.otelLogsLifecycle.policyId | quote }}
                  retention={{ .Values.opensearch.otelLogsLifecycle.retention | quote }}

                  request() {
                    curl -fsS --retry 3 --retry-all-errors --retry-delay 1 "$@"
                  }

                  request "$endpoint/_cluster/health?wait_for_status=yellow&timeout=30s" >/dev/null

                  policy_status="$(curl -sS --retry 3 --retry-all-errors --retry-delay 1 -o /dev/null -w '%{http_code}' "$endpoint/_plugins/_ism/policies/$policy")"
                  case "$policy_status" in
                    200) ;;
                    404)
                      request -X PUT "$endpoint/_plugins/_ism/policies/$policy" \
                        -H 'Content-Type: application/json' \
                        --data "{\"policy\":{\"description\":\"Delete $pattern after $retention\",\"default_state\":\"hot\",\"ism_template\":[{\"index_patterns\":[\"$pattern\"],\"priority\":100}],\"states\":[{\"name\":\"hot\",\"actions\":[],\"transitions\":[{\"state_name\":\"delete\",\"conditions\":{\"min_index_age\":\"$retention\"}}]},{\"name\":\"delete\",\"actions\":[{\"delete\":{}}],\"transitions\":[]}]}}" >/dev/null
                      policy_created=true
                      ;;
                    *) echo "Unexpected ISM policy status: $policy_status" >&2; exit 1 ;;
                  esac

                  request -X PUT "$endpoint/_index_template/otel-logs-single-node" \
                    -H 'Content-Type: application/json' \
                    --data "{\"index_patterns\":[\"$pattern\"],\"priority\":100,\"template\":{\"settings\":{\"number_of_shards\":1,\"number_of_replicas\":0}}}" >/dev/null

                  indexes="$(request "$endpoint/_cat/indices/$pattern?h=index")"
                  for index in $indexes; do
                    if ! request -X POST "$endpoint/_plugins/_ism/add/$index" \
                      -H 'Content-Type: application/json' \
                      --data "{\"policy_id\":\"$policy\"}" >/dev/null; then
                      echo "ISM add returned an error for $index; verifying current assignment" >&2
                    fi
                    assignment="$(request "$endpoint/_plugins/_ism/explain/$index?show_policy=true")"
                    printf '%s' "$assignment" | grep -Eq "\"(index\\.plugins\\.index_state_management\\.policy_id|index\\.opendistro\\.index_state_management\\.policy_id)\"[[:space:]]*:[[:space:]]*\"$policy\"" || {
                      echo "Unexpected ISM policy for $index" >&2
                      exit 1
                    }
                    request -X PUT "$endpoint/$index/_settings" \
                      -H 'Content-Type: application/json' \
                      --data '{"index":{"number_of_replicas":0}}' >/dev/null
                  done
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                readOnlyRootFilesystem: true
              resources:
{{ toYaml .Values.opensearch.otelLogsLifecycle.resources | indent 16 }}
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
{{- end }}
