{{- if eq .Release.Namespace "techx-observability" }}
# === RBAC for AI Team (ai-readers) ===
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-observability-reader
  namespace: techx-observability
rules:
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["services/proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-observability-reader-binding
  namespace: techx-observability
subjects:
  - kind: Group
    name: "ai-readers"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: ai-observability-reader
  apiGroup: rbac.authorization.k8s.io

---
# === RBAC for Security/Reliability Team (security-reliability-auditors) ===
# 1. ClusterRole and ClusterRoleBinding for Node Capacity and Metrics
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: security-reliability-capacity-readonly
rules:
  - apiGroups: [""]
    resources: ["nodes", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: security-reliability-capacity-readonly-binding
subjects:
  - kind: Group
    name: "security-reliability-auditors"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: security-reliability-capacity-readonly
  apiGroup: rbac.authorization.k8s.io
---
# 2. Namespace-scoped Role and RoleBinding for techx-observability incident investigation
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: security-reliability-observability-access
  namespace: techx-observability
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "configmaps", "persistentvolumeclaims", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: security-reliability-observability-access-binding
  namespace: techx-observability
subjects:
  - kind: Group
    name: "security-reliability-auditors"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: security-reliability-observability-access
  apiGroup: rbac.authorization.k8s.io
{{- end }}

{{- if eq .Release.Namespace "techx-tf4" }}
# 2. Namespace Role and RoleBinding for techx-tf4 runtime evidence
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: security-reliability-namespace-readonly
  namespace: techx-tf4
rules:
  - apiGroups: [""]
    resources: ["pods", "events", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: security-reliability-namespace-readonly-binding
  namespace: techx-tf4
subjects:
  - kind: Group
    name: "security-reliability-auditors"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: security-reliability-namespace-readonly
  apiGroup: rbac.authorization.k8s.io
---
# === RBAC for Audit Team (audit-readonly-analyzers) ===
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: audit-namespace-readonly
  namespace: techx-tf4
rules:
  - apiGroups: [""]
    resources: ["pods", "events", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: audit-namespace-readonly-binding
  namespace: techx-tf4
subjects:
  - kind: Group
    name: "audit-readonly-analyzers"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: audit-namespace-readonly
  apiGroup: rbac.authorization.k8s.io
---
# === RBAC for AI Team preflight jobs ===
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-preflight-job-runner
  namespace: techx-tf4
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-preflight-job-runner-binding
  namespace: techx-tf4
subjects:
  - kind: Group
    name: "ai-readers"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: ai-preflight-job-runner
  apiGroup: rbac.authorization.k8s.io
---
# === RBAC for Terraform plan / GitHub Actions Karpenter validation ===
# These resources codify the temporary access previously granted during the
# Karpenter rollout so Terraform plan can read Helm release state and resolve
# Karpenter CRDs without requiring broad cluster-admin access.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-actions-terraform-plan-helm-readonly
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "pods", "services", "serviceaccounts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-terraform-plan-helm-readonly
  namespace: kube-system
subjects:
  - kind: Group
    name: "github-actions-terraform-plan-readonly"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: github-actions-terraform-plan-helm-readonly
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: terraform-plan-crd-reader
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["karpenter.k8s.aws"]
    resources: ["ec2nodeclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["karpenter.sh"]
    resources: ["nodepools"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: terraform-plan-crd-reader
subjects:
  - kind: Group
    name: "terraform-plan-readers"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: terraform-plan-crd-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
