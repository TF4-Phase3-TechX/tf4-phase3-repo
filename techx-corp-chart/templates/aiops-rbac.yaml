{{- if (.Values.components.aiops).enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-remediation
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"{{- if .Values.aiopsRemediation.liveEnabled }}, "patch"{{- end }}]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-remediation
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: aiops
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aiops-remediation
{{- end }}
