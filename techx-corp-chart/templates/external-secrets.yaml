{{/* Temporary handover: release the current target Secret without deleting it.
     The GitOps ExternalSecret becomes the sole Owner before this object is removed. */}}
{{- if and .Values.prometheus.enabled .Values.prometheus.alertmanager.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-slack-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: alertmanager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: alertmanager-slack-webhook
    creationPolicy: Orphan
  data:
    - secretKey: webhook-url
      remoteRef:
        key: techx/tf4/alertmanager-slack-webhook
{{- end }}
