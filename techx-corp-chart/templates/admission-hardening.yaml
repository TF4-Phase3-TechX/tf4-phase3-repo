{{- if eq .Release.Namespace "techx-tf4" }}
# ── Policy: run as non-root ─────────────────────────────────────────────────
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: require-run-as-nonroot
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["pods"]
  validations:
  - expression: >
      object.spec.containers.all(c,
        c.?securityContext.?runAsNonRoot.orValue(
          object.spec.?securityContext.?runAsNonRoot.orValue(false)) == true &&
        c.?securityContext.?runAsUser.orValue(
          object.spec.?securityContext.?runAsUser.orValue(-1)) != 0)
    message: "Container must run as non-root: set runAsNonRoot=true at pod or container level, and must not set runAsUser=0."
  - expression: >
      !has(object.spec.initContainers) ||
      object.spec.initContainers.all(c,
        c.?securityContext.?runAsNonRoot.orValue(
          object.spec.?securityContext.?runAsNonRoot.orValue(false)) == true &&
        c.?securityContext.?runAsUser.orValue(
          object.spec.?securityContext.?runAsUser.orValue(-1)) != 0)
    message: "Container/initContainer must run as non-root: set runAsNonRoot=true at pod or container level, and must not set runAsUser=0."
---
# ── Policy: disallow mutable / untagged image ───────────────────────────────
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: disallow-mutable-image-tag
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["pods"]
  validations:
  - expression: >
      object.spec.containers.all(c,
        c.image.matches('^(.*/)?[^/:@]+(:[A-Za-z0-9_.-]+|@sha256:[0-9a-f]{64}|:[A-Za-z0-9_.-]+@sha256:[0-9a-f]{64})$') &&
        !c.image.endsWith(':latest'))
    message: "Image must pin a fixed tag or digest (repo:tag, repo@sha256:<digest>, or repo:tag@sha256:<digest>); ':latest', untagged images, and untagged images behind a registry:port are not allowed."
  - expression: >
      !has(object.spec.initContainers) ||
      object.spec.initContainers.all(c,
        c.image.matches('^(.*/)?[^/:@]+(:[A-Za-z0-9_.-]+|@sha256:[0-9a-f]{64}|:[A-Za-z0-9_.-]+@sha256:[0-9a-f]{64})$') &&
        !c.image.endsWith(':latest'))
    message: "Image must pin a fixed tag or digest (repo:tag, repo@sha256:<digest>, or repo:tag@sha256:<digest>); ':latest', untagged images, and untagged images behind a registry:port are not allowed."
---
# ── Policy: require digest-pinned images for SEC-17 enforcement scope ───────
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: require-digest-image-reference
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["pods"]
  validations:
  - expression: >
      object.spec.containers.all(c,
        c.image.matches('^(.*/)?[^/:@]+(:[A-Za-z0-9_.-]+)?@sha256:[0-9a-f]{64}$'))
    message: "Image must be pinned by immutable digest for SEC-17: repo@sha256:<digest> or repo:tag@sha256:<digest>."
  - expression: >
      !has(object.spec.initContainers) ||
      object.spec.initContainers.all(c,
        c.image.matches('^(.*/)?[^/:@]+(:[A-Za-z0-9_.-]+)?@sha256:[0-9a-f]{64}$'))
    message: "Init container image must be pinned by immutable digest for SEC-17: repo@sha256:<digest> or repo:tag@sha256:<digest>."
---
# ── Policy: require resource requests and limits ────────────────────────────
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: require-resource-limits
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["pods"]
  validations:
  - expression: >
      object.spec.containers.all(c,
        has(c.resources) &&
        has(c.resources.requests) && has(c.resources.requests.cpu) && has(c.resources.requests.memory) &&
        has(c.resources.limits) && has(c.resources.limits.cpu) && has(c.resources.limits.memory))
    message: "Container must define both requests and limits for cpu and memory."
  - expression: >
      !has(object.spec.initContainers) ||
      object.spec.initContainers.all(c,
        has(c.resources) &&
        has(c.resources.requests) && has(c.resources.requests.cpu) && has(c.resources.requests.memory) &&
        has(c.resources.limits) && has(c.resources.limits.cpu) && has(c.resources.limits.memory))
    message: "Container/initContainer must define both requests and limits for cpu and memory."
---
# ── Policy: drop all capabilities ───────────────────────────────────────────
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: require-drop-all-capabilities
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["pods"]
  validations:
  - expression: >
      object.spec.containers.all(c,
        c.?securityContext.?capabilities.?drop.orValue([]).exists(d, d == 'ALL') &&
        c.?securityContext.?capabilities.?add.orValue([]).all(a, a in ['NET_BIND_SERVICE']))
    message: "Container must drop all capabilities (securityContext.capabilities.drop: [\"ALL\"]); only NET_BIND_SERVICE may be added back."
  - expression: >
      !has(object.spec.initContainers) ||
      object.spec.initContainers.all(c,
        c.?securityContext.?capabilities.?drop.orValue([]).exists(d, d == 'ALL') &&
        c.?securityContext.?capabilities.?add.orValue([]).all(a, a in ['NET_BIND_SERVICE']))
    message: "Container/initContainer must drop all capabilities (securityContext.capabilities.drop: [\"ALL\"]); only NET_BIND_SERVICE may be added back."
{{- end }}
