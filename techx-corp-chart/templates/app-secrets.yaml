{{- if .Values.secrets }}
{{- range $name, $secret := .Values.secrets }}
{{- if $secret.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    helm.sh/chart: {{ include "techx-corp.chart" $ }}
    app.kubernetes.io/part-of: techx-corp
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
type: Opaque
stringData:
  {{- range $key, $value := $secret.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
