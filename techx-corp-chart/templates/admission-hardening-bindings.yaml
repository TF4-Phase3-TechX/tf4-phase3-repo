{{- if eq .Release.Namespace "techx-tf4" }}
{{- $excludedNamespaces := list "kube-system" "kube-node-lease" "kube-public" }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: require-run-as-nonroot-binding
spec:
  policyName: require-run-as-nonroot
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values: {{ $excludedNamespaces | toYaml | nindent 8 }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: require-drop-all-capabilities-binding
spec:
  policyName: require-drop-all-capabilities
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values: {{ $excludedNamespaces | toYaml | nindent 8 }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: disallow-mutable-image-tag-binding
spec:
  policyName: disallow-mutable-image-tag
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values: {{ $excludedNamespaces | toYaml | nindent 8 }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  annotations:
    techx.io/sec17-stage: "test-scope-only"
    techx.io/sec17-note: "Expand to production only after GitOps image revisions include digests and build signatures are verified."
  name: require-digest-image-reference-binding
spec:
  policyName: require-digest-image-reference
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchLabels:
        techx.io/sec17-digest-enforce: "true"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: require-resource-limits-binding
spec:
  policyName: require-resource-limits
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values: {{ $excludedNamespaces | toYaml | nindent 8 }}
{{- end }}
