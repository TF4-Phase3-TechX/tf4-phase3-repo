groups:
  - name: aiops-detector-notifications
    interval: 30s
    rules:
      - alert: AIOpsIncidentDetected
        expr: |
          sum by (incident_type, service, severity) (
            increase(aiops_incidents_created_total[3m])
          ) > 0
        labels:
          severity: "{{ $labels.severity }}"
          owner: aio01
          component: aiops-detector
        annotations:
          summary: "AIOps detected {{ $labels.incident_type }} on {{ $labels.service }}"
          description: "The sustained detector created an incident. Open the AIOps incident API, inspect its Prometheus/OpenSearch/Jaeger evidence and follow the bound runbook before approving any action."
          runbook_url: https://github.com/TF4-Phase3-TechX/tf4-phase3-repo/blob/main/docs/aiops/README.md

      - alert: AIOpsTelemetryPollingDegraded
        expr: |
          sum by (source) (
            increase(aiops_telemetry_poll_failures_total[5m])
          ) > 0
        for: 2m
        labels:
          severity: warning
          owner: aio01
          component: aiops-detector
        annotations:
          summary: "AIOps cannot poll {{ $labels.source }} reliably"
          description: "The detector recorded repeated telemetry polling failures. Treat detection coverage as degraded and use the read-only /v1/telemetry/status probe."
          runbook_url: https://github.com/TF4-Phase3-TechX/tf4-phase3-repo/blob/main/docs/aiops/README.md

      - alert: AIOpsSignalCoverageDegraded
        expr: |
          sum by (source, signal, service, state) (
            increase(aiops_telemetry_coverage_degraded_total[5m])
          ) > 0
        for: 2m
        labels:
          severity: warning
          owner: aio01
          component: aiops-detector
        annotations:
          summary: "AIOps {{ $labels.signal }} coverage is {{ $labels.state }} for {{ $labels.service }}"
          description: "The detector did not receive a complete ready baseline from {{ $labels.source }}. This observation cannot auto-resolve an active incident."
          runbook_url: https://github.com/TF4-Phase3-TechX/tf4-phase3-repo/blob/main/docs/aiops/README.md
