name: build-and-push

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag. Default = short SHA.
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - 'techx-corp-platform/**'
      - 'deploy/build-push-images.sh'
      - '.github/workflows/build-and-push.yaml'

permissions:
  contents: read
  id-token: write

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  build:
    name: Build and push app images
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      image_repository: ${{ steps.vars.outputs.image_repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_BUILD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          INPUT_TAG="${{ inputs.image_tag }}"
          IMAGE_TAG="${INPUT_TAG:-$SHORT_SHA}"
          IMAGE_REPOSITORY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_REPOSITORY=${IMAGE_REPOSITORY}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create CI env override
        shell: bash
        run: |
          cat > techx-corp-platform/.env.override <<EOF
          IMAGE_NAME=${IMAGE_REPOSITORY}
          IMAGE_VERSION=1.0
          DEMO_VERSION=${IMAGE_TAG}
          EOF
          cat techx-corp-platform/.env.override

      - name: Prepare currency proto build directory
        working-directory: techx-corp-platform
        run: mkdir -p src/currency/proto

      - name: Smoke build checkout image
        working-directory: techx-corp-platform
        run: docker compose --env-file .env --env-file .env.override build checkout

      - name: Build and push service images
        run: deploy/build-push-images.sh

      - name: Write build metadata
        shell: bash
        run: |
          cat > build-metadata.json <<EOF
          {
            "image_repository": "${IMAGE_REPOSITORY}",
            "image_tag": "${IMAGE_TAG}",
            "example": "${IMAGE_REPOSITORY}:${IMAGE_TAG}-checkout",
            "git_sha": "${GITHUB_SHA}"
          }
          EOF
          cat build-metadata.json

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata-${{ steps.vars.outputs.image_tag }}
          path: build-metadata.json
          if-no-files-found: error

  deploy-after-build:
    name: Deploy built image
    needs: [build]
    uses: ./.github/workflows/deploy.yaml
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
      deploy_observability: true
    secrets: inherit
