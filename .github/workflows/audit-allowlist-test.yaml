name: audit-allowlist-test

on:
  workflow_dispatch:
    inputs:
      test_id:
        description: 'Test ID (e.g. allowlist-test-11)'
        required: true
        default: 'allowlist-test-11'

permissions:
  contents: read
  id-token: write

jobs:
  test-allowlist:
    name: T4 – Allowlist CI/CD noise-reduction test
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (CI/CD role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_TERRAFORM_APPLY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Verify assumed role identity
        run: aws sts get-caller-identity

      - name: Create test IAM user (allowlist action – should NOT alert)
        id: create_user
        run: |
          USER_NAME="ci-${{ github.event.inputs.test_id }}"
          echo "Creating user: $USER_NAME"
          aws iam create-user --user-name "$USER_NAME"
          echo "user_name=$USER_NAME" >> "$GITHUB_OUTPUT"

      - name: Cleanup – delete test IAM user
        if: always()
        run: |
          USER_NAME="ci-${{ github.event.inputs.test_id }}"
          echo "Deleting user: $USER_NAME"
          aws iam delete-user --user-name "$USER_NAME" || echo "User may not exist, skipping"

      - name: Summary
        run: |
          echo "## T4 Allowlist Test Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- Role assumed: \`tf4-github-actions-terraform-apply\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- IAM user created and deleted via CI/CD role" >> "$GITHUB_STEP_SUMMARY"
          echo "- Expected: CloudWatch alert should NOT fire (noise reduction)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Verify in CloudTrail: userIdentity.arn contains \`tf4-github-actions-terraform-apply\`" >> "$GITHUB_STEP_SUMMARY"
