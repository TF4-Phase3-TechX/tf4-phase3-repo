name: ci

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || '511825856493' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'techx-corp' }}

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
      chart: ${{ steps.filter.outputs.chart }}
      deploy: ${{ steps.filter.outputs.deploy }}
      terraform: ${{ steps.filter.outputs.terraform }}
      bootstrap: ${{ steps.filter.outputs.bootstrap }}
      workflows: ${{ steps.filter.outputs.workflows }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'techx-corp-platform/**'
              - 'deploy/build-push-images.sh'
            chart:
              - 'techx-corp-chart/**'
            deploy:
              - 'deploy/**'
              - '!deploy/build-push-images.sh'
            terraform:
              - 'infra/terraform/**'
            bootstrap:
              - 'infra/bootstrap/**'
            workflows:
              - '.github/workflows/**'
            docs:
              - 'docs/**'
              - 'README.md'

  yaml-check:
    name: YAML parse check
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.chart == 'true' || needs.changes.outputs.deploy == 'true' || needs.changes.outputs.terraform == 'true' || needs.changes.outputs.bootstrap == 'true' || needs.changes.outputs.workflows == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse YAML files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          import yaml

          roots = [Path('.github'), Path('deploy'), Path('techx-corp-chart')]
          failed = False
          for root in roots:
              if not root.exists():
                  continue
              for path in list(root.rglob('*.yml')) + list(root.rglob('*.yaml')):
                  if '.terraform' in path.parts or 'charts' in path.parts or 'templates' in path.parts:
                      continue
                  try:
                      list(yaml.safe_load_all(path.read_text(encoding='utf-8')))
                  except Exception as exc:
                      failed = True
                      print(f'{path}: {exc}', file=sys.stderr)
          raise SystemExit(1 if failed else 0)
          PY

  terraform-bootstrap-plan:
    name: Terraform bootstrap plan
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.bootstrap == 'true'
    defaults:
      run:
        working-directory: infra/bootstrap
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials for plan
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -lock=false -input=false -no-color -out=tfplan

      - name: Upload bootstrap plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-bootstrap-plan
          path: infra/bootstrap/tfplan
          if-no-files-found: error

  terraform-infra-plan:
    name: Terraform infra plan
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.terraform == 'true'
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials for plan
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -lock=false -input=false -no-color -out=tfplan

      - name: Upload infra plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-infra-plan
          path: infra/terraform/tfplan
          if-no-files-found: error

  helm-render:
    name: Helm lint and render
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.chart == 'true' || needs.changes.outputs.deploy == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Add Helm repos
        run: |
          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add jaegertracing https://jaegertracing.github.io/helm-charts
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana-community https://grafana-community.github.io/helm-charts
          helm repo add opensearch https://opensearch-project.github.io/helm-charts
          helm repo update

      - name: Build Helm dependencies
        run: helm dependency build ./techx-corp-chart

      - name: Helm lint baseline chart
        run: helm lint ./techx-corp-chart

      - name: Render observability release
        run: |
          helm template techx-observability ./techx-corp-chart \
            --namespace techx-observability \
            -f deploy/values-observability.yaml \
            > /tmp/techx-observability.yaml

      - name: Render app release
        run: |
          helm template techx-corp ./techx-corp-chart \
            --namespace techx-tf4 \
            --set default.image.repository=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY} \
            --set default.image.tag=preview \
            -f deploy/values-app-stamp.yaml \
            > /tmp/techx-corp-app.yaml

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v4
        with:
          name: rendered-manifests
          path: |
            /tmp/techx-observability.yaml
            /tmp/techx-corp-app.yaml
          if-no-files-found: error

  app-smoke-build:
    name: Docker smoke build checkout
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.app == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create CI env override
        shell: bash
        run: |
          cat > techx-corp-platform/.env.override <<EOF
          IMAGE_NAME=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}
          IMAGE_VERSION=1.0
          DEMO_VERSION=preview
          EOF
          cat techx-corp-platform/.env.override

      - name: Build checkout image only
        working-directory: techx-corp-platform
        run: docker compose --env-file .env --env-file .env.override build checkout