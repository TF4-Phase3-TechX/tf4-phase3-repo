name: Pinned dependencies guard

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check-pinned-dependencies:
    name: check-pinned-dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Test and enforce immutable dependency pins
        run: python scripts/check_pinned_dependencies.py --self-test
