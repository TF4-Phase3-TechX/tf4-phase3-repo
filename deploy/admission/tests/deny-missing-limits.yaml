apiVersion: apps/v1
kind: Deployment
metadata:
  name: admission-test-missing-limits
spec:
  replicas: 1
  selector:
    matchLabels: { app: admission-test-missing-limits }
  template:
    metadata:
      labels: { app: admission-test-missing-limits }
    spec:
      containers:
        - name: test
          image: busybox:1.37.0
          command: ["sh", "-c", "sleep 3600"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 5m, memory: 8Mi }
