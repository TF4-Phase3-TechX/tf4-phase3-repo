# Runtime hardening admission policies (policy-as-code).
#
# Cluster-scoped ValidatingAdmissionPolicy + bindings that enforce baseline pod
# security at admission time: run-as-non-root, no mutable/untagged images,
# required cpu+memory requests/limits, and drop-all capabilities.
#
# Standalone manifest (applied directly, not through the Helm chart): these are
# cluster-scoped singletons, so rendering them from a chart that is installed as
# multiple releases would create the same object twice and cause ownership
# conflicts.
#
# Apply / rollback:
#   kubectl apply  -f deploy/admission/runtime-hardening.yaml
#   kubectl delete -f deploy/admission/runtime-hardening.yaml
#
# Rollout model:
#   - This file only applies the policies and the production bindings, in
#     [Audit, Warn] — violations are recorded, nothing is blocked. Flip a single
#     binding to [Deny] once that rule reports zero violations.
#   - Deny-mode demo bindings (for showing a real rejection against a violating
#     manifest without touching production) are a separate, manually-applied
#     artifact — not included here.
#
# One-time namespace bootstrap:
#   kubectl label namespace techx-tf4 techx.io/policy-scope=enforced --overwrite
#   kubectl label namespace techx-observability techx.io/policy-scope=enforced --overwrite

# ── Policy: run as non-root ─────────────────────────────────────────────────
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: require-run-as-nonroot
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["pods"]
  validations:
  # Effective runAsNonRoot: container-level overrides pod-level (matches Kubernetes
  # semantics), so a pod that sets runAsNonRoot only at pod level is not rejected.
  - expression: >
      (object.spec.containers + object.spec.?initContainers.orValue([])).all(c,
        c.?securityContext.?runAsNonRoot.orValue(
          object.spec.?securityContext.?runAsNonRoot.orValue(false)) == true)
    message: "Container/initContainer must run as non-root: set runAsNonRoot=true at pod or container level."
---
# ── Policy: disallow mutable / untagged image ───────────────────────────────
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: disallow-mutable-image-tag
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["pods"]
  validations:
  - expression: >
      (object.spec.containers + object.spec.?initContainers.orValue([])).all(c,
        c.image.contains(':') && !c.image.endsWith(':latest'))
    message: "Image must pin a fixed tag or digest (repo:tag or repo@sha256:...); ':latest' or untagged images are not allowed."
---
# ── Policy: require resource requests and limits ────────────────────────────
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: require-resource-limits
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["pods"]
  validations:
  - expression: >
      (object.spec.containers + object.spec.?initContainers.orValue([])).all(c,
        has(c.resources) &&
        has(c.resources.requests) && has(c.resources.requests.cpu) && has(c.resources.requests.memory) &&
        has(c.resources.limits) && has(c.resources.limits.cpu) && has(c.resources.limits.memory))
    message: "Container/initContainer must define both requests and limits for cpu and memory."
---
# ── Policy: drop all capabilities ───────────────────────────────────────────
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: require-drop-all-capabilities
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["pods"]
  validations:
  # Drop ALL then add back only what is required — enforce the drop: [ALL] part only.
  - expression: >
      (object.spec.containers + object.spec.?initContainers.orValue([])).all(c,
        c.?securityContext.?capabilities.?drop.orValue([]).exists(d, d == 'ALL'))
    message: "Container/initContainer must drop all capabilities: set securityContext.capabilities.drop: [\"ALL\"] (add back only what is required)."
---
# ── Production bindings
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: require-run-as-nonroot-binding
spec:
  policyName: require-run-as-nonroot
  validationActions: [Audit, Warn]
  matchResources:
    namespaceSelector:
      matchLabels: { techx.io/policy-scope: enforced }
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: require-drop-all-capabilities-binding
spec:
  policyName: require-drop-all-capabilities
  validationActions: [Audit, Warn]
  matchResources:
    namespaceSelector:
      matchLabels: { techx.io/policy-scope: enforced }
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: disallow-mutable-image-tag-binding
spec:
  policyName: disallow-mutable-image-tag
  validationActions: [Audit, Warn]
  matchResources:
    namespaceSelector:
      matchLabels: { techx.io/policy-scope: enforced }
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: require-resource-limits-binding
spec:
  policyName: require-resource-limits
  validationActions: [Audit, Warn]
  matchResources:
    namespaceSelector:
      matchLabels: { techx.io/policy-scope: enforced }
