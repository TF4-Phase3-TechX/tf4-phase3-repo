apiVersion: v1
kind: Pod
metadata:
  name: d5-metrics-probe
  namespace: techx-admission-test
  labels:
    app.kubernetes.io/name: d5-metrics-probe
    app.kubernetes.io/part-of: d5-perf-03
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      imagePullPolicy: IfNotPresent
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsUser: 100
        runAsGroup: 101
      resources:
        requests: { cpu: 10m, memory: 16Mi }
        limits: { cpu: 100m, memory: 64Mi }
      command: ["sh", "-c"]
      args:
        - |
          set -eu
          base=http://prometheus.techx-observability.svc.cluster.local:9090/api/v1/query
          query() {
            echo "=== $1 ==="
            curl -fsSG "$base" --data-urlencode "query=$2"
            echo
          }
          query browse_p95 'histogram_quantile(0.95, sum by (le) (rate(traces_span_metrics_duration_milliseconds_bucket{service_name="frontend",span_kind="SPAN_KIND_SERVER",span_name=~"GET /|GET /product.*|GET /api/products.*|GET /api/data.*"}[5m])))'
          query browse_success '100 * sum(rate(traces_span_metrics_calls_total{service_name="frontend",span_kind="SPAN_KIND_SERVER",span_name=~"GET /|GET /product.*|GET /api/products.*|GET /api/data.*",status_code!="STATUS_CODE_ERROR"}[5m])) / sum(rate(traces_span_metrics_calls_total{service_name="frontend",span_kind="SPAN_KIND_SERVER",span_name=~"GET /|GET /product.*|GET /api/products.*|GET /api/data.*"}[5m]))'
          query cart_success '100 * sum(rate(traces_span_metrics_calls_total{service_name="frontend",span_kind="SPAN_KIND_SERVER",span_name=~"(GET|POST|DELETE) /api/cart",status_code!="STATUS_CODE_ERROR"}[5m])) / sum(rate(traces_span_metrics_calls_total{service_name="frontend",span_kind="SPAN_KIND_SERVER",span_name=~"(GET|POST|DELETE) /api/cart"}[5m]))'
          query checkout_success '100 * sum(rate(traces_span_metrics_calls_total{service_name="frontend",span_kind="SPAN_KIND_SERVER",span_name="POST /api/checkout",status_code!="STATUS_CODE_ERROR"}[5m])) / sum(rate(traces_span_metrics_calls_total{service_name="frontend",span_kind="SPAN_KIND_SERVER",span_name="POST /api/checkout"}[5m]))'
          query checkout_calls 'sum by (status_code) (rate(traces_span_metrics_calls_total{service_name="frontend",span_kind="SPAN_KIND_SERVER",span_name="POST /api/checkout"}[5m]))'
          query checkout_p95 'histogram_quantile(0.95, sum by (le) (rate(traces_span_metrics_duration_milliseconds_bucket{service_name="frontend",span_kind="SPAN_KIND_SERVER",span_name="POST /api/checkout"}[5m])))'
          query load_generator_rate 'sum(rate(traces_span_metrics_calls_total{service_name="load-generator"}[5m])) or vector(0)'
          query throttling 'sum(rate(container_cpu_cfs_throttled_periods_total{namespace="techx-tf4"}[5m])) / clamp_min(sum(rate(container_cpu_cfs_periods_total{namespace="techx-tf4"}[5m])), 1)'
          query pending 'sum(kube_pod_status_phase{namespace="techx-tf4",phase="Pending"}) or vector(0)'
          query restarts 'sum(kube_pod_container_status_restarts_total{namespace="techx-tf4"}) or vector(0)'
